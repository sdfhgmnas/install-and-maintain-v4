<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0" />
  <meta name="theme-color" content="#0891b2" />

  <!-- PWA / iOS / Android home-screen install support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GPS Tracker" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="GPS Tracker" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
  <link rel="shortcut icon" href="icon-192.png" />

  <title>GPS Maintenance Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app"></div>

  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
  </div>

  <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- Barcode scanner with CDN fallback chain (some networks block one CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"
          onerror="this.onerror=null; var s=document.createElement('script'); s.src='https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js'; document.head.appendChild(s);"></script>
  <!-- Optional: uncomment to point at a different Supabase project -->
  <!-- <script src="config.js"></script> -->
  <script src="db.js"></script>
  <script src="app.js"></script>

  <!-- Service worker registration for PWA / offline shell -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
